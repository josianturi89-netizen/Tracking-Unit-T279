<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Tracking Unit - Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 p-6">

    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-bold text-white mb-6">Monitoring Logistik Unit</h1>

        <div class="glass p-6 rounded-2xl border border-slate-800 shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left" id="unitTable">
                    <thead>
                        <tr class="text-slate-400 border-b border-slate-700">
                            <th class="p-3">Customer <br><input type="text" placeholder="Cari Cust..." onkeyup="filterTable(0)" class="w-full mt-1 bg-slate-900 border border-slate-700 rounded px-2 py-1 text-xs text-white"></th>
                            <th class="p-3">Sales <br><input type="text" placeholder="Cari Sales..." onkeyup="filterTable(1)" class="w-full mt-1 bg-slate-900 border border-slate-700 rounded px-2 py-1 text-xs text-white"></th>
                            <th class="p-3">Lokasi (Func.Loc) <br><input type="text" placeholder="Cari Loc..." onkeyup="filterTable(2)" class="w-full mt-1 bg-slate-900 border border-slate-700 rounded px-2 py-1 text-xs text-white"></th>
                            <th class="p-3">Aging <br><input type="text" placeholder="Hari..." onkeyup="filterTable(3)" class="w-full mt-1 bg-slate-900 border border-slate-700 rounded px-2 py-1 text-xs text-white"></th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-800">
                        <tr><td class="p-3">RIA BUDI RAHAYU</td><td class="p-3">SANDI ILHAMSYAH</td><td class="p-3"><span class="bg-red-900 text-red-200 px-2 rounded">TNVDC-KARAWANG</span></td><td class="p-3">-9</td></tr>
                        <tr><td class="p-3">RUDI HARTONO</td><td class="p-3">DIAN SINTARA</td><td class="p-3"><span class="bg-amber-900 text-amber-200 px-2 rounded">TNVDC-CIBITUNG</span></td><td class="p-3">-8</td></tr>
                        <tr><td class="p-3">ARIE WIDODO</td><td class="p-3">SANDI ILHAMSYAH</td><td class="p-3"><span class="bg-green-900 text-green-200 px-2 rounded">TPDC-CBN</span></td><td class="p-3 text-red-400 font-bold">1</td></tr>
                        <tr><td class="p-3">DAYAT HIDAYAT</td><td class="p-3">EGIE AFRIAMAN</td><td class="p-3"><span class="bg-green-900 text-green-200 px-2 rounded">TPDC-CBN</span></td><td class="p-3">-5</td></tr>
                        <tr><td class="p-3">ARDIANSYAH</td><td class="p-3">WINA KRIS</td><td class="p-3"><span class="bg-green-900 text-green-200 px-2 rounded">TPDC-CBN</span></td><td class="p-3">-7</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function filterTable(colIndex) {
            let input = document.querySelectorAll('input')[colIndex];
            let filter = input.value.toUpperCase();
            let table = document.getElementById("unitTable");
            let tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName("td")[colIndex];
                if (td) {
                    let txtValue = td.textContent || td.innerText;
                    tr[i].style.display = txtValue.toUpperCase().indexOf(filter) > -1 ? "" : "none";
                }
            }
        }
    </script>
</body>
</html>
