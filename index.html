<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Tracking Unit - Realtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-4">

    <div class="max-w-6xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h1 class="text-2xl font-bold border-l-4 border-blue-500 pl-4 text-blue-400">UNIT LOGISTICS TRACKER</h1>
            <input type="text" id="searchInput" placeholder="Cari nama customer atau unit..." 
                   class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 w-full md:w-80 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 text-center">
            <div class="bg-slate-800 p-4 rounded-xl border-t-4 border-red-500">
                <span class="text-xs uppercase text-slate-400 font-bold">Lahir di Pabrik</span>
                <h3 class="text-lg font-bold">KARAWANG</h3>
                <p class="text-3xl mt-2">1</p>
            </div>
            <div class="bg-slate-800 p-4 rounded-xl border-t-4 border-amber-500">
                <span class="text-xs uppercase text-slate-400 font-bold">Gudang Transit</span>
                <h3 class="text-lg font-bold text-amber-500">CIBITUNG</h3>
                <p class="text-3xl mt-2">1</p>
            </div>
            <div class="bg-slate-800 p-4 rounded-xl border-t-4 border-green-500">
                <span class="text-xs uppercase text-slate-400 font-bold">Ready Delivery</span>
                <h3 class="text-lg font-bold text-green-500">TPDC-CBN</h3>
                <p class="text-3xl mt-2">5</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-slate-800 p-6 rounded-xl shadow-lg">
                <h2 class="font-bold mb-4 text-slate-400 uppercase text-xs">Distribusi Stok</h2>
                <canvas id="unitChart"></canvas>
            </div>

            <div class="bg-slate-800 p-6 rounded-xl shadow-lg lg:col-span-2 overflow-x-auto">
                <h2 class="font-bold mb-4 text-slate-400 uppercase text-xs">Live Tracking Data</h2>
                <table class="w-full text-left">
                    <thead class="text-slate-500 border-b border-slate-700">
                        <tr>
                            <th class="pb-2 text-sm">Customer</th>
                            <th class="pb-2 text-sm text-center">Status</th>
                            <th class="pb-2 text-sm">Aging</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable" class="divide-y divide-slate-700">
                        <tr><td class="py-3">RIA BUDI RAHAYU</td><td class="text-center"><span class="bg-red-900/50 text-red-400 px-3 py-1 rounded-full text-xs">KARAWANG</span></td><td class="text-green-400 font-mono">-9</td></tr>
                        <tr><td class="py-3">RUDI HARTONO</td><td class="text-center"><span class="bg-amber-900/50 text-amber-400 px-3 py-1 rounded-full text-xs">CIBITUNG</span></td><td class="text-green-400 font-mono">-8</td></tr>
                        <tr><td class="py-3">ARIE WIDODO</td><td class="text-center"><span class="bg-green-900/50 text-green-400 px-3 py-1 rounded-full text-xs">TPDC-CBN</span></td><td class="text-red-400 font-mono">1</td></tr>
                        <tr><td class="py-3">DAYAT HIDAYAT</td><td class="text-center"><span class="bg-green-900/50 text-green-400 px-3 py-1 rounded-full text-xs">TPDC-CBN</span></td><td class="text-green-400 font-mono">-5</td></tr>
                        <tr><td class="py-3">MUHAMAD SAMHAN</td><td class="text-center"><span class="bg-green-900/50 text-green-400 px-3 py-1 rounded-full text-xs">TPDC-CBN</span></td><td class="text-green-400 font-mono">-7</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Chart Config
        const ctx = document.getElementById('unitChart');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Karawang', 'Cibitung', 'CBN'],
                datasets: [{
                    data: [1, 1, 5],
                    backgroundColor: ['#ef4444', '#f59e0b', '#22c55e'],
                    borderColor: '#1e293b',
                    borderWidth: 4
                }]
            },
            options: { plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } } }
        });

        // Search Filter
        document.getElementById('searchInput').addEventListener('keyup', function() {
            let filter = this.value.toUpperCase();
            let rows = document.getElementById('dataTable').getElementsByTagName('tr');
            for (let row of rows) {
                row.innerText.toUpperCase().includes(filter) ? row.style.display = "" : row.style.display = "none";
            }
        });
    </script>
</body>
</html>
